<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EV Betting Tool</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>EV Betting Tool</h1>
      <p class="subtitle">Live odds across books + your probability model</p>
    </header>

    <div class="controls">
      <div class="control-group">
        <label for="sport-sel">Sport</label>
        <select id="sport-sel">
          <option value="americanfootball_nfl">NFL</option>
          <option value="americanfootball_ncaaf">NCAA Football</option>
          <option value="basketball_nba">NBA</option>
          <option value="basketball_ncaab">NCAA Basketball</option>
          <option value="baseball_mlb">MLB</option>
          <option value="icehockey_nhl">NHL</option>
          <option value="soccer_epl">Soccer — EPL</option>
          <option value="soccer_uefa_champs_league">Soccer — Champions League</option>
        </select>
      </div>
      <div class="control-group">
        <label for="market-sel">Market</label>
        <select id="market-sel">
          <option value="h2h">Moneyline</option>
          <option value="spreads">Spread</option>
          <option value="totals">Over/Under</option>
        </select>
      </div>
      <button id="fetch-btn" onclick="fetchOdds()">Fetch live odds</button>
    </div>

    <div id="api-remaining" class="api-note" style="display:none;"></div>
    <div id="games-container">
      <p class="status-msg">Select a sport and market, then fetch live odds.</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
